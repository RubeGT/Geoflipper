<!DOCTYPE html>
<html>
<head>
    <title>Geoflipper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="map-wrapper">
            <div id="street-view"></div>
        </div>

        <div id="guess-map"></div>
        
        <button id="guess-btn">Confirm Guess</button>
        <div id="ui-overlay">
            <h2 id="score-display">Score: 0</h2>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initGame" async defer></script>
    <script src="script.js"></script>
</body>
</html>
